<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
        <div id="participants-section" class="participants-section hidden">
          <h4>Participants</h4>
          <ul id="participants-list" class="participants-list"></ul>
        </div>
        <div id="activities" class="activity-cards">
          <!-- Activity cards will be inserted here by app.js -->
        </div>
        <script>
          // ...existing code...
          function createActivityCard(activityName, activity) {
            const card = document.createElement('div');
            card.className = 'activity-card';
            card.innerHTML = `
                <h3>${activityName}</h3>
                <p><strong>Description:</strong> ${activity.description}</p>
                <p><strong>Schedule:</strong> ${activity.schedule}</p>
                <p><strong>Max Participants:</strong> ${activity.max_participants}</p>
                <div class="participants-section">
                  <strong>Participants:</strong>
                  <ul class="participants-list">
                    ${activity.participants && activity.participants.length > 0 ? activity.participants.map(p => `<li>${p}</li>`).join('') : '<li><em>No participants yet</em></li>'}
                  </ul>
                </div>
                <form class="signup-form">
                    <input type="email" name="email" placeholder="Your email" required />
                    <button type="submit">Sign Up</button>
                </form>
                <div class="signup-message"></div>
            `;
            // ...existing code...
            return card;
          }
          function showParticipants(activityName) {
            fetch(`/activities/${encodeURIComponent(activityName)}/participants`)
              .then(res => res.json())
              .then(data => {
                const section = document.getElementById('participants-section');
                const list = document.getElementById('participants-list');
                list.innerHTML = '';
                if (data.participants && data.participants.length > 0) {
                  data.participants.forEach(p => {
                    const li = document.createElement('li');
                    li.textContent = p;
                    list.appendChild(li);
                  });
                } else {
                  const li = document.createElement('li');
                  li.innerHTML = '<em>No participants yet</em>';
                  list.appendChild(li);
                }
                section.classList.remove('hidden');
              });
          }
          // Example: show participants for the first activity on load
          document.addEventListener('DOMContentLoaded', () => {
            const firstCard = document.querySelector('.activity-card h3');
            if (firstCard) showParticipants(firstCard.textContent);
          });
        </script>
        <style>
          /* ...existing code... */
          .participants-section {
            margin: 10px 0 10px 0;
            background: #f8f9fa;
            border-radius: 6px;
            padding: 8px 12px;
          }
          .participants-section strong {
            color: #2d3a4a;
          }
          .participants-list {
            margin: 6px 0 0 18px;
            padding: 0;
            color: #3a3a3a;
          }
          .participants-list li {
            margin-bottom: 2px;
            font-size: 0.97em;
          }
          /* ...existing code... */
        </style>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
